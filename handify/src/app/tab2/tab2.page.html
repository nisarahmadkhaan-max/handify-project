<ion-content [fullscreen]="true" class="dashboard-content">
  

  <!-- Main Content -->
  <div class="main-container">
    <div class="container-header">
      <!-- Greeting -->
      <div class="greeting-section">
        <div class="greeting-text">
          <h1>{{ translationService.getTranslation('allCategories') }}</h1>
        </div>
        <div class="notification-icons">
          <div  (click)="goTOChat()" class="icon-container">
            <ion-icon name="chatbubble-outline"></ion-icon>
            <span class="notification-dot"></span>
          </div>
          <div (click)="goToNoti()" class="icon-container">
            <ion-icon name="notifications-outline"></ion-icon>
            <span class="notification-dot"></span>
          </div>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="search-container">
        <ion-searchbar
          #searchBar
          [(ngModel)]="searchTerm"
          (ionInput)="filterCategories($event)"
          [placeholder]="translationService.getTranslation('searchPlaceholder')"
          class="custom-searchbar">
        </ion-searchbar>
        <div class="voice-search-buttons">
          <ion-button 
            *ngIf="!isListening"
            fill="clear" 
            class="voice-search-btn start-btn" 
            (click)="startVoiceSearch()"
            [disabled]="isStartingRecognition"
            type="button">
            <ion-icon name="mic-outline" slot="icon-only"></ion-icon>
          </ion-button>
          <ion-button 
            *ngIf="isListening"
            fill="clear" 
            class="voice-search-btn stop-btn" 
            (click)="stopVoiceSearch()"
            type="button">
            <ion-icon name="stop-circle" slot="icon-only"></ion-icon>
          </ion-button>
        </div>
      </div>
      
      <!-- Voice Search Status Indicator -->
      <div *ngIf="isListening" class="voice-status-indicator">
        <div class="listening-indicator">
          <div class="wave-container">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
          </div>
          <span class="listening-text">Listening...</span>
        </div>
      </div>
    </div>
    
    <div style="padding: 20px 16px;">
      <div class="categories-grid">
        <div *ngFor="let category of filteredCategories" (click)="getCat(category)">
          <div class="category-card">
            <img [src]="category.image" />
          </div>
          <p class="cat_name">{{ category.name }}</p>
        </div>
      </div>
    </div>
  </div>
</ion-content>
