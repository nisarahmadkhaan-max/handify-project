<ion-content class="login-page">
  <img class="logo" src="assets/logo_onboarding.png" alt="Handify Logo" />
  <div class="auth-container">
    <div class="main-section">
      <!-- Step 1: Forget Password (Email Input) -->
      <div *ngIf="currentStep === 1">
        <h2 class="welcome-title">Forget Password?</h2>
        <p class="subtitle">Enter your registered Email below to receive OTP</p>
        <div class="input-container">
          <ion-icon name="mail-outline"></ion-icon>
          <ion-input 
            type="email"
            placeholder="Email Address (e.g. name@gmail.com)"
            [(ngModel)]="email"
            (ionInput)="validateEmail()">
          </ion-input>
        </div>

        <div class="button-row">
          <ion-button
            expand="block"
            fill="outline"
            class="back-btn"
            (click)="router.navigateByUrl('/login')">
            Back
          </ion-button>
          <ion-button
            expand="block"
            class="login-btn-small"
            [disabled]="!isEmailValid"
            (click)="requestOTP()">
            Next
          </ion-button>
        </div>
      </div>

      <!-- Step 2: OTP Verification -->
      <div *ngIf="currentStep === 2">
        <h2 class="welcome-title">Verify OTP</h2>
        <p class="subtitle">We have sent a 4-digit code to:<br><strong>{{ email }}</strong></p>
        <div class="otp-container" style="justify-content:center; gap:10px; margin-bottom:20px;">
          <ion-input 
            *ngFor="let digit of otpDigits; let i = index"
            class="otp-input"
            type="tel"
            maxlength="1"
            [(ngModel)]="otpDigits[i]"
            (ionInput)="onOtpChange($event, i)"
            #otpInput>
          </ion-input>
        </div>
        <div class="resend-container">
          <span>Didn't get the code?</span>
          <ion-button fill="clear" class="resend-button" (click)="resendOTP()">
            RESEND
          </ion-button>
        </div>
        <div class="button-row">
          <ion-button fill="outline" class="back-btn" (click)="currentStep = 1">
            Back
          </ion-button>
          <ion-button
            class="login-btn-small"
            [disabled]="!isOtpValid()"
            (click)="verifyOTP()">
            CONFIRM
          </ion-button>
        </div>
      </div>

      <!-- Step 3: New Password Screen -->
      <div *ngIf="currentStep === 3">
        <h2 class="welcome-title">Reset Password</h2>
        <p class="subtitle">Create a strong new password for your account</p>
        <div class="input-container">
          <ion-icon name="lock-closed-outline"></ion-icon>
          <ion-input 
            [type]="showPassword ? 'text' : 'password'" 
            placeholder="New Password"
            [(ngModel)]="newPassword"
            (ionInput)="validatePassword()">
          </ion-input>
          <ion-icon 
            class="eye-icon"
            [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" 
            (click)="togglePasswordVisibility('password')">
          </ion-icon>
        </div>
        <div class="input-container">
          <ion-icon name="lock-closed-outline"></ion-icon>
          <ion-input 
            [type]="showConfirmPassword ? 'text' : 'password'" 
            placeholder="Confirm Password"
            [(ngModel)]="confirmPassword"
            (ionInput)="validatePassword()">
          </ion-input>
          <ion-icon 
            class="eye-icon"
            [name]="showConfirmPassword ? 'eye-outline' : 'eye-off-outline'" 
            (click)="togglePasswordVisibility('confirm')">
          </ion-icon>
        </div>
        <ion-button 
          expand="full" 
          class="login-btn" 
          [disabled]="!isPasswordValid" 
          (click)="resetPassword()">
          RESET PASSWORD
        </ion-button>
      </div>
    </div>
  </div>
</ion-content>
