<ion-content class="login-page">
  <img class="logo" src="assets/logo_onboarding.png" alt="Handify Logo" />
  
  <div class="auth-container">
    <div class="auth-header">
      <span class="tab" [ngClass]="{'active': !isSignIn, 'inactive': isSignIn}" (click)="isSignIn = false">SIGN UP</span>
      <span class="tab" [ngClass]="{'active': isSignIn, 'inactive': !isSignIn}" (click)="isSignIn = true">SIGN IN</span>
    </div>
    
    <!-- Sign In View -->
    <div *ngIf="isSignIn" class="main-section">
      <h2 class="welcome-title">Welcome Back</h2>
      <p class="subtitle">Sign in to your account using email</p>

      <div class="input-container">
        <ion-icon name="mail-outline"></ion-icon>
        <ion-input [(ngModel)]="email" placeholder="Email Address (e.g. name@gmail.com)" type="email"></ion-input>
      </div>
      
      <div class="input-container">
        <ion-icon name="lock-closed-outline"></ion-icon>
        <ion-input [(ngModel)]="password" [type]="showPassword ? 'text' : 'password'" placeholder="Password"></ion-input>
        <ion-icon class="eye-icon" [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" (click)="togglePasswordVisibility()"></ion-icon>
      </div>

      <p class="forgot-password" (click)="forgotpass()">Forgot Password?</p>
      
      <ion-button expand="full" class="login-btn" (click)="loginBtn()">SIGN IN</ion-button>
    </div>
    
    <!-- Sign Up View -->
    <div *ngIf="!isSignIn" class="main-section">
      <h2 class="welcome-title">Create Account</h2>
      <p class="subtitle">Register to get started</p>
      
      <div class="input-container">
        <ion-icon name="person-outline"></ion-icon>
        <ion-input [(ngModel)]="fullName" placeholder="Full Name"></ion-input>
      </div>
      
      <div class="input-container">
        <ion-icon name="mail-outline"></ion-icon>
        <ion-input [(ngModel)]="email" placeholder="Email (must be @gmail.com)" type="email"></ion-input>
      </div>
      
      <div class="input-container">
        <ion-icon name="call-outline"></ion-icon>
        <ion-input [(ngModel)]="phoneNumber" placeholder="Phone Number (11 digits)" type="tel"></ion-input>
      </div>
      
      <div class="input-container">
        <ion-icon name="lock-closed-outline"></ion-icon>
        <ion-input [(ngModel)]="password" [type]="showPassword ? 'text' : 'password'" placeholder="Password"></ion-input>
        <ion-icon class="eye-icon" [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" (click)="togglePasswordVisibility()"></ion-icon>
      </div>

      <ion-button expand="full" class="login-btn" (click)="loginBtn()">SIGN UP</ion-button>
    </div>
  </div>
</ion-content>
