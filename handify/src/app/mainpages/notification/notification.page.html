<ion-header class="custom-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button text="" icon="chevron-back-outline"></ion-back-button>
    </ion-buttons>
    <ion-title class="ion-text-center">{{ translationService.getTranslation('notifications') }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="markAllAsRead()" class="mark-read-btn">
        {{ translationService.getTranslation('markAllRead') }}
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="notification-content">
  <div class="notification-container">
    <!-- Show this message if there are no notifications -->
    <div *ngIf="notifications.length === 0" class="no-notifications-message">
      {{ translationService.getTranslation('noNotificationsToShow') }}
    </div>
    <!-- Show notifications if available -->
    <div class="notification-item" *ngFor="let notification of notifications">
      <div class="notification-icon">
        <ion-icon name="notifications-outline"></ion-icon>
        <div class="notification-dot" *ngIf="!notification.isRead"></div>
      </div>
      <div class="notification-content">
        <div class="notification-header">
          <h2 class="notification-title">{{ notification.title }}</h2>
          <span class="notification-time">{{ notification.timestamp }}</span>
        </div>
        <p class="notification-message">{{ notification.message }}</p>
      </div>
    </div>
  </div>
</ion-content>
